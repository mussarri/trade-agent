exchange:
  id: binance
  sandbox: false

symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - XRP/USDT
  

timeframes:
  htf: ["1h"]
  ltf: ["5m"]

scoring:
  min_score: 65
  min_rr_ratio: 2.0

risk:
  risk_per_trade_pct: 1.0
  atr_sl_multiplier: 0.5
  atr_period: 14

alerts:
  telegram:
    enabled: true
  discord:
    enabled: false
  webhook:
    enabled: false
  email:
    enabled: false
    daily_summary: true
    summary_hour: 8
  filters:
    min_score: 65
    min_rr_ratio: 2.0
    cooldown_minutes: 5

scenarios:
  enabled: ["htf_pullback_continuation"]
