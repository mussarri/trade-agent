exchange:
  id: binance
  sandbox: false
  market_type: future

symbols:
  - BTC/USDT:USDT
  - ETH/USDT:USDT
  - SOL/USDT:USDT
  - XRP/USDT:USDT
  

timeframes:
  htf: ["1h"]
  ltf: ["5m"]

scoring:
  min_score: 65
  min_rr_ratio: 2.0

risk:
  risk_per_trade_pct: 1.0
  atr_sl_multiplier: 0.5
  atr_period: 14

structure:
  htf_pivot_length: 5
  ltf_pivot_length: 3
  min_swing_distance_atr_mult: 0.8
  equal_level_tolerance: 0.001
  use_close_for_break_confirmation: true

alerts:
  telegram:
    enabled: true
  discord:
    enabled: false
  webhook:
    enabled: false
  email:
    enabled: false
    daily_summary: true
    summary_hour: 8
  filters:
    min_score: 65
    min_rr_ratio: 2.0
    cooldown_minutes: 5

scenarios:
  enabled: ["htf_pullback_continuation"]
