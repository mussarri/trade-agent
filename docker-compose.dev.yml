version: "3.9"

services:
  engine:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: trade-agent-engine-dev
    env_file: .env
    volumes:
      - .:/app
      - ./config:/app/config
    ports:
      - "8000:8000"
    command: ["python", "-m", "uvicorn", "main:app", "--reload", "--host", "0.0.0.0", "--port", "8000"]
